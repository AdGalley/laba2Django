<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Design.pro - Главная</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        nav { background-color: #f4f4f4; padding: 10px; margin-bottom: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #333; }
        .auth-links { float: right; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'home' %}">Главная</a>
        {% if user.is_authenticated %}
            <span>Привет, {{ user.get_full_name|default:user.username }}!</span>
            <div class="auth-links">
                <a href="{% url 'logout' %}">Выход</a>
            </div>
        {% else %}
            <div class="auth-links">
                <a href="{% url 'login' %}">Вход</a>
                <a href="{% url 'register' %}">Регистрация</a>
            </div>
        {% endif %}
    </nav>

    <h1>Добро пожаловать в Design.pro</h1>
    <p>Портал для заказа дизайн-проектов интерьеров.</p>
</body>
</html>
